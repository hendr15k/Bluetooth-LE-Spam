name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Install Android SDK
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
        run: |
          set -e
          mkdir -p "$ANDROID_HOME"
          cd "$ANDROID_HOME"

          # Download command-line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11040533_latest.zip -O cmdline-tools.zip
          mkdir -p cmdline-tools
          unzip -o cmdline-tools.zip -d cmdline-tools
          mv cmdline-tools/cmdline-tools cmdline-tools/latest
          rm cmdline-tools.zip

          # Export for gradle
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"

          # Accept licenses
          yes | cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1

          # Install SDK platform and build-tools
          cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set environments
        run: |
          {
            echo "ANDROID_HOME=${{ github.workspace }}/android-sdk"
            echo "version=v$(grep -oP 'versionName\s*=\s*\"\K[^\"]+' app/build.gradle.kts)"
            echo "commit=$(echo ${{ github.sha }} | cut -c-7)"
            echo "repo=$(echo ${GITHUB_REPOSITORY#$GITHUB_REPOSITORY_OWNER/})"
          } >> $GITHUB_ENV

      - name: Build
        run: |
          if [ "${{ secrets.STORE_FILE }}" != "" ]; then
            echo "${{ secrets.STORE_FILE }}" | base64 -d > app/release.jks
            export STORE_PASSWORD="${{ secrets.STORE_PASSWORD }}"
            export KEY_ALIAS="${{ secrets.KEY_ALIAS }}"
            export KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"
          fi
          ./gradlew assemble --no-daemon --stacktrace --warning-mode=all

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.repo }}(${{ env.version }}@${{ env.commit }})
          path: app/build/outputs/apk/**/app-*.apk